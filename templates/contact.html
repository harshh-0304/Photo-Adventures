{% extends "base.html" %}
{% block title %}Photo Adventures - Contact{% endblock %}
{% block content %}
<div class="wrapper my-5 py-5">
  <main>
    <div class="container-md container-contact bg-white rounded-3" data-aos="fade-down">
      <div class="row g-0">
        <div class="col col-md mx-4 py-5">
          <div class="mb-4">
            <h3 class="card-title mb-2">Get in touch</h3>
            <p class="text-muted">Have a question or feedback? We'd love to hear from you.</p>
          </div>
          <form onsubmit="return sendMail(this);" class="contact-form">
            <div class="form-floating my-3">
              <input type="text" name="name" id="fullname" class="form-control form-control-lg" placeholder="John Doe"
                {% if user.is_authenticated %}value="{{ user_name }}" {% endif %} required>
              <label for="fullname">Your name</label>
            </div>
            <div class="form-floating my-3">
              {% if user.is_authenticated %}
              <input type="email" name="email" id="emailaddress" class="form-control form-control-lg" placeholder="{{ user_email }}"
                value="{{ user_email }}" required>
              {% else %}
              <input type="email" name="email" id="emailaddress" class="form-control form-control-lg" placeholder="email@example.com"
                required>
              {% endif %}
              <label for="emailaddress">Email address</label>
            </div>
            <div class="form-floating my-3">
              <textarea name="message" id="messagebody" class="form-control form-control-lg" placeholder="Type your message here"
                style="height: 200px;" required></textarea>
              <label for="messagebody">Your message</label>
            </div>

            <div class="d-flex align-items-center gap-3 mt-4">
              <button type="submit" class="btn btn-green btn-lg">
                <i class="fa-regular fa-paper-plane me-2"></i>Send message
              </button>
              <div class="g-recaptcha" data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"></div>
            </div>
            <div class="d-none alert mt-3" id="contactFormAlert" role="alert">
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>
{% endblock %}
